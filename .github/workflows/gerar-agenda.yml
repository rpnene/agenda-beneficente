name: Gerar agenda diária

on:
  schedule:
    - cron: '0 9 * * *'   # todo dia às 09h UTC (06h em SC)
  workflow_dispatch:        # permite rodar manualmente

permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install anthropic

      - name: Gerar página HTML
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python gerar_agenda.py
          cp agenda_beneficente.html docs/index.html

      - name: Publicar alterações
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html
          git commit -m "Atualiza agenda" || echo "Nada para atualizar"
          git push
          
