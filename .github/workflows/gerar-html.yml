name: Gerar agenda HTML - diário

on:
  schedule:
    - cron: '0 9 * * *'   # todo dia às 09h UTC (06h em SC)
  workflow_dispatch:
  repository_dispatch:
    types: [nova-reserva]
permissions:
  contents: write

jobs:
  gerar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install gspread google-auth

      - name: Gerar página HTML a partir da planilha
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          python gerar_html.py
          cp agenda_beneficente.html docs/index.html

      - name: Publicar alterações
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/index.html
          git commit -m "Atualiza agenda" || echo "Nada para atualizar"
          git push
